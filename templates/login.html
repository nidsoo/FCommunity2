{% load static %}
<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

    <div class="auth-container">

        <h1>Login</h1>

        <form method="POST">
            {% csrf_token %}

            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username">

            <label>Password</label>

            <div class="password-box">
                <input type="password" id="login-password" name="password" placeholder="Enter password">
                <i class="ri-eye-line" id="toggleLogin"></i>
            </div>

            <button type="submit">Login</button>

        </form>

    </div>

    <script>
        const pass = document.getElementById("login-password");
        const toggle = document.getElementById("toggleLogin");

        toggle.onclick = () => {
            if (pass.type === "password") {
                pass.type = "text";
                toggle.classList.replace("ri-eye-line", "ri-eye-off-line");
            } else {
                pass.type = "password";
                toggle.classList.replace("ri-eye-off-line", "ri-eye-line");
            }
        };
    </script>

</body>

</html>
